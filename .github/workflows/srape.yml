name: Daily Turo Scrape

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# This line gives the script permission to save the file
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: python scraper.py

      # This replaces all the SFTP stuff! It simply saves the file to your repo.
      - name: Commit and Push updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated daily Turo data update"
          file_pattern: 'turo_data.json'
